<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đề xuất dành cho bạn — uSRD</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="usrd-header" data-active="de-xuat.html"></div>

<section class="page-header">
  <div class="wrap">
    <h1>Đề xuất dành cho bạn</h1>
    <p>Dựa trên lịch sử đọc và chân dung học tập của bạn.</p>
  </div>
</section>

<section class="section" style="border-bottom:none;">
  <div class="wrap">
    <div class="doc-list" id="fullList">
      <p class="empty-state">Đang tải dữ liệu...</p>
    </div>
  </div>
</section>

<div id="usrd-footer"></div>
<script src="js/partials.js"></script>
<script src="js/data.js"></script>
<script>
  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  async function renderFullList() {
    const list = document.getElementById("fullList");
    const docs = await usrdLoadDocuments();

    if (docs.length === 0) {
      list.innerHTML = '<p class="empty-state">Chưa có tài liệu nào. Thêm dữ liệu vào Google Sheet để hiển thị ở đây.</p>';
      return;
    }

    list.innerHTML = docs.map(doc => `
      <div class="doc-list-item">
        <div>
          <div class="doc-meta"><span class="doc-type">${escapeHtml(doc.type || "Tài liệu")}</span></div>
          <h4 class="doc-title">${escapeHtml(doc.title)}</h4>
          <p class="doc-desc">${escapeHtml(doc.desc)}</p>
          <p class="doc-author">${escapeHtml(doc.author || "Chưa rõ tác giả")}</p>
        </div>
        <a class="save-btn" href="${escapeHtml(doc.fileLink)}" target="_blank" rel="noopener">Xem tài liệu</a>
      </div>
    `).join("");
  }

  renderFullList();
</script>
</body>
</html>
