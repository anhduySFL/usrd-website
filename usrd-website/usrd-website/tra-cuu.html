<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu tài liệu — uSRD</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="usrd-header" data-active="tra-cuu.html"></div>

<section class="page-header">
  <div class="wrap">
    <h1>Tra cứu tài liệu</h1>
    <p>Tìm kiếm trong toàn bộ kho tài liệu của uSRD theo tên, tác giả, loại hoặc chủ đề.</p>
  </div>
</section>

<section class="section" style="border-bottom:none;">
  <div class="wrap">
    <div class="filter-row">
      <input type="text" id="searchInput" placeholder="Nhập từ khóa tìm kiếm..." style="flex:1; min-width:220px;">
      <select id="typeFilter">
        <option value="">Tất cả loại tài liệu</option>
        <option value="Bài giảng">Bài giảng</option>
        <option value="Sách tham khảo">Sách tham khảo</option>
        <option value="Báo cáo">Báo cáo</option>
        <option value="Bài nghiên cứu">Bài nghiên cứu</option>
        <option value="Luận văn">Luận văn</option>
      </select>
    </div>

    <div class="doc-list" id="resultList"></div>
    <p class="empty-state" id="emptyState" style="display:none;">Không tìm thấy tài liệu phù hợp. Thử từ khóa khác.</p>
  </div>
</section>

<div id="usrd-footer"></div>

<script src="js/partials.js"></script>
<script>
  // Dữ liệu mẫu — sau này thay bằng dữ liệu thật (Google Sheet / CMS)
  const documents = [
    { type: "Bài giảng", title: "Giải tích 1 – Toán cao cấp", desc: "Tài liệu tóm tắt lý thuyết và bài tập có lời giải chi tiết.", author: "Nguyễn Văn A · ĐH Bách Khoa", date: "12/05/2024" },
    { type: "Sách tham khảo", title: "Kinh tế vĩ mô – Pindyck", desc: "Tóm tắt nội dung chính và các ví dụ minh họa dễ hiểu.", author: "Trần Thị B · UEH", date: "10/05/2024" },
    { type: "Báo cáo", title: "Báo cáo QoS mạng 5G", desc: "Phân tích chất lượng dịch vụ và đánh giá hiệu năng mạng 5G.", author: "Lê Minh C · ĐH Công nghệ", date: "08/05/2024" },
    { type: "Bài nghiên cứu", title: "Deep learning for medical image analysis", desc: "A survey on recent advances and applications.", author: "John Doe · MIT", date: "07/05/2024" },
    { type: "Luận văn", title: "Ứng dụng AI trong y học hiện đại", desc: "Luận văn thạc sĩ về các ứng dụng thực tiễn của trí tuệ nhân tạo trong ngành y học.", author: "Phạm Văn B · ĐH Quốc gia", date: "10/07/2026" },
    { type: "Báo cáo", title: "Blockchain và ứng dụng trong quản lý chuỗi cung ứng", desc: "Bài trình bày tại hội thảo quốc tế về công nghệ blockchain.", author: "Trần C và Đội · Tech Conference", date: "05/07/2026" }
  ];

  const resultList = document.getElementById("resultList");
  const emptyState = document.getElementById("emptyState");
  const searchInput = document.getElementById("searchInput");
  const typeFilter = document.getElementById("typeFilter");

  function render() {
    const q = searchInput.value.trim().toLowerCase();
    const type = typeFilter.value;

    const filtered = documents.filter(doc => {
      const matchesQuery = !q ||
        doc.title.toLowerCase().includes(q) ||
        doc.desc.toLowerCase().includes(q) ||
        doc.author.toLowerCase().includes(q);
      const matchesType = !type || doc.type === type;
      return matchesQuery && matchesType;
    });

    resultList.innerHTML = filtered.map(doc => `
      <div class="doc-list-item">
        <div>
          <div class="doc-meta"><span class="doc-type">${doc.type}</span><span class="doc-date">${doc.date}</span></div>
          <h4 class="doc-title">${doc.title}</h4>
          <p class="doc-desc">${doc.desc}</p>
          <p class="doc-author">${doc.author}</p>
        </div>
        <button class="save-btn">Lưu</button>
      </div>
    `).join("");

    emptyState.style.display = filtered.length === 0 ? "block" : "none";
  }

  // Đọc từ khóa từ URL nếu đến từ ô search ở trang chủ
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get("q")) searchInput.value = urlParams.get("q");

  searchInput.addEventListener("input", render);
  typeFilter.addEventListener("change", render);
  render();
</script>
</body>
</html>
